<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF-Ansicht</title>
  <style>
    :root {
      --bg: #eef3f6;
      --card: #ffffff;
      --text: #10212b;
      --muted: #5e6d78;
      --border: rgba(16, 33, 43, 0.1);
      --shadow: 0 16px 36px rgba(11, 27, 36, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }
    p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      appearance: none;
      border: 0;
      background: #0b5cab;
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .btn.secondary {
      background: #dfe8ee;
      color: var(--text);
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .state {
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }
    .page {
      display: block;
      width: 100%;
      max-width: 100%;
      margin: 0 auto 18px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="title">PDF-Ansicht</h1>
      <p id="meta">Datei wird geladen…</p>
    </div>
    <div class="actions">
      <button class="btn secondary" onclick="window.close()">Fenster schließen</button>
    </div>
  </header>

  <main>
    <div id="state" class="state">PDF wird geladen…</div>
    <div id="pages"></div>
  </main>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const title = params.get('title') || 'PDF-Ansicht';
    const titleEl = document.getElementById('title');
    const metaEl = document.getElementById('meta');
    const stateEl = document.getElementById('state');
    const pagesEl = document.getElementById('pages');

    titleEl.textContent = title;
    metaEl.textContent = file || 'Keine Datei angegeben';

    async function renderAllPages() {
      if (!file) {
        stateEl.textContent = 'Keine PDF-Datei angegeben.';
        return;
      }

      try {
        const loadingTask = pdfjsLib.getDocument(file);
        const pdf = await loadingTask.promise;
        metaEl.textContent = `${pdf.numPages} Seite${pdf.numPages === 1 ? '' : 'n'}`;
        stateEl.textContent = 'Seiten werden gerendert…';

        for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
          const page = await pdf.getPage(pageNumber);
          const unscaled = page.getViewport({ scale: 1 });
          const maxWidth = Math.min(1000, document.documentElement.clientWidth - 48);
          const scale = Math.min(maxWidth / unscaled.width, 2.0);
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.className = 'page';
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          pagesEl.appendChild(canvas);

          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
        }

        stateEl.remove();
      } catch (error) {
        console.error(error);
        stateEl.innerHTML = 'Die PDF konnte nicht dargestellt werden.<br />Bitte prüfen, ob die Datei vorhanden ist und der Dateiname in <b>public/presse/articles.json</b> exakt stimmt.';
      }
    }

    renderAllPages();
  </script>
</body>
</html>
