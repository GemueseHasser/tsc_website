<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF-Ansicht</title>
  <style>
    :root {
      --bg: #eef3f6;
      --card: #ffffff;
      --text: #10212b;
      --muted: #5e6d78;
      --border: rgba(16, 33, 43, 0.1);
      --shadow: 0 5px 14px rgba(11, 27, 36, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .zoom-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .zoom-label {
      min-width: 62px;
      text-align: center;
      font-weight: 700;
      color: var(--muted);
    }

    .btn {
      appearance: none;
      border: 0;
      background: #0b5cab;
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .btn.secondary {
      background: #dfe8ee;
      color: var(--text);
    }

    main {
      padding: 24px 16px 48px;
    }

    .state {
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    .pages-wrap {
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      padding-bottom: 8px;
    }

    .pages-inner {
      width: max-content;
      min-width: 100%;
      margin: 0 auto;
    }

    .page {
      display: block;
      margin: 0 auto 18px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 700px) {
      header {
        padding: 14px 12px;
        align-items: flex-start;
      }

      h1 {
        font-size: 18px;
      }

      .btn {
        padding: 9px 12px;
      }

      .page {
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
<header>
  <div>
    <h1 id="title">PDF-Ansicht</h1>
    <p id="meta">Datei wird geladen…</p>
  </div>

  <div class="actions">
    <div class="zoom-group">
      <button class="btn secondary" id="zoomOut" type="button">−</button>
      <div class="zoom-label" id="zoomLabel">100 %</div>
      <button class="btn secondary" id="zoomIn" type="button">+</button>
    </div>
    <button class="btn secondary" onclick="window.close()">Fenster schließen</button>
  </div>
</header>

<main>
  <div id="state" class="state">PDF wird geladen…</div>

  <div class="pages-wrap" id="pagesWrap">
    <div id="pages" class="pages-inner"></div>
  </div>
</main>

<script type="module">
  import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  const title = params.get('title') || 'PDF-Ansicht';

  const titleEl = document.getElementById('title');
  const metaEl = document.getElementById('meta');
  const stateEl = document.getElementById('state');
  const pagesEl = document.getElementById('pages');
  const zoomInButton = document.getElementById('zoomIn');
  const zoomOutButton = document.getElementById('zoomOut');
  const zoomLabel = document.getElementById('zoomLabel');

  titleEl.textContent = title;
  metaEl.textContent = file || 'Keine Datei angegeben';

  let pdfDocument = null;
  let zoom = 1;
  let isRendering = false;
  let queuedRender = false;

  function updateZoomLabel() {
    zoomLabel.textContent = `${Math.round(zoom * 100)} %`;
  }

  function getAvailableWidth() {
    return Math.max(320, window.innerWidth - 32);
  }

  function getInitialFitFactor() {
    if (window.innerWidth <= 700) return 0.92;
    if (window.innerWidth <= 1100) return 0.82;
    return 0.72;
  }

  async function ensurePdfLoaded() {
    if (pdfDocument) return pdfDocument;
    const loadingTask = pdfjsLib.getDocument(file);
    pdfDocument = await loadingTask.promise;
    metaEl.textContent = `${pdfDocument.numPages} Seite${pdfDocument.numPages === 1 ? '' : 'n'}`;
    return pdfDocument;
  }

  async function renderAllPages() {
    if (!file) {
      stateEl.hidden = false;
      stateEl.textContent = 'Keine PDF-Datei angegeben.';
      return;
    }

    if (isRendering) {
      queuedRender = true;
      return;
    }

    isRendering = true;
    queuedRender = false;

    try {
      await ensurePdfLoaded();

      stateEl.hidden = false;
      stateEl.textContent = 'Seiten werden gerendert…';
      pagesEl.innerHTML = '';

      const firstPage = await pdfDocument.getPage(1);
      const firstViewport = firstPage.getViewport({ scale: 1 });

      const availableWidth = getAvailableWidth();
      const fitFactor = getInitialFitFactor();
      const baseFitScale = (availableWidth * fitFactor) / firstViewport.width;
      const renderScale = baseFitScale * zoom;

      const pageWidth = firstViewport.width * renderScale;
      pagesEl.style.width = `${Math.max(pageWidth, availableWidth)}px`;

      for (let pageNumber = 1; pageNumber <= pdfDocument.numPages; pageNumber += 1) {
        const page = await pdfDocument.getPage(pageNumber);
        const viewport = page.getViewport({ scale: renderScale });

        const outputScale = Math.max(2.2, (window.devicePixelRatio || 1) * 1.6);

        const canvas = document.createElement('canvas');
        canvas.className = 'page';
        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${viewport.width}px`;
        canvas.style.height = `${viewport.height}px`;

        const ctx = canvas.getContext('2d', { alpha: false });
        ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);

        pagesEl.appendChild(canvas);

        await page.render({
          canvasContext: ctx,
          viewport
        }).promise;
      }

      stateEl.hidden = true;
    } catch (error) {
      console.error(error);
      stateEl.hidden = false;
      stateEl.innerHTML = 'Die PDF konnte nicht dargestellt werden.<br />Bitte prüfen, ob die Datei vorhanden ist und der Dateiname stimmt.';
    } finally {
      isRendering = false;

      if (queuedRender) {
        renderAllPages();
      }
    }
  }

  function changeZoom(delta) {
    const nextZoom = Math.max(0.8, Math.min(zoom + delta, 3), 0.8);
    if (nextZoom === zoom) return;

    zoom = nextZoom;
    updateZoomLabel();
    renderAllPages();
  }

  zoomInButton.addEventListener('click', () => changeZoom(0.2));
  zoomOutButton.addEventListener('click', () => changeZoom(-0.2));

  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      renderAllPages();
    }, 120);
  });

  updateZoomLabel();
  renderAllPages();
</script>
</body>
</html>
