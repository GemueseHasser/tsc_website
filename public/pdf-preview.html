<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF-Vorschau</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f4f7f9;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 12px;
      box-sizing: border-box;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      box-shadow: 0 12px 30px rgba(11, 27, 36, 0.16);
      background: #fff;
      border-radius: 8px;
    }
    .state {
      color: #4c5b66;
      text-align: center;
      line-height: 1.5;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="state" class="state">PDF wird geladen…</div>
    <canvas id="canvas" hidden></canvas>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    const canvas = document.getElementById('canvas');
    const state = document.getElementById('state');

    async function renderPreview() {
      if (!file) {
        state.textContent = 'Keine PDF-Datei angegeben.';
        return;
      }

      try {
        const loadingTask = pdfjsLib.getDocument(file);
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);

        const parent = document.querySelector('.wrap');
        const targetWidth = Math.max(320, parent.clientWidth - 24);
        const unscaled = page.getViewport({ scale: 1 });
        const scale = Math.min(targetWidth / unscaled.width, 2.2);
        const viewport = page.getViewport({ scale });

        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext: ctx, viewport }).promise;

        state.hidden = true;
        canvas.hidden = false;
      } catch (error) {
        console.error(error);
        state.innerHTML = 'Die PDF-Vorschau konnte nicht geladen werden.<br />Bitte prüfen, ob die Datei vorhanden ist und der Dateiname in <b>public/presse/articles.json</b> exakt stimmt.';
      }
    }

    renderPreview();
    window.addEventListener('resize', () => window.location.reload(), { once: true });
  </script>
</body>
</html>
